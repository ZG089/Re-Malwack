name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v7.0)"
        required: true
      versionCode:
        description: "Numeric versionCode (must increase each release)"
        required: true
      releaseName:
        description: "Release name (optional)"
        required: false
        default: ""
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set variables
        id: setup
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSIONCODE="${{ github.event.inputs.versionCode }}"
          ZIP_NAME="Re-Malwack_${VERSION}"
          REPO="${{ github.repository }}"
          DL_URL="https://github.com/${REPO}/releases/download/${VERSION}/${ZIP_NAME}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSIONCODE=$VERSIONCODE" >> $GITHUB_ENV
          echo "DL_URL=$DL_URL" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 'latest'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: build webui
        run: |
          cd webui
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Update module.prop version + versionCode
        run: |
          sed -i "s/^version=.*/version=${VERSION}/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=${VERSIONCODE}/" module/module.prop
          echo "Updated module.prop:"
          grep -E "^(version|versionCode)=" module/module.prop

      - name: Update update.json
        run: |
          jq ".version = \"${VERSION}\" | .versionCode = ${VERSIONCODE} | .zipUrl = \"${DL_URL}\"" update.json > update.json.tmp
          mv update.json.tmp update.json
          echo "Updated update.json:"
          cat update.json
          
      - name: Update README.md version badge
        run: |
          sed -i 's|^\[!\[Module Version\].*|[![Module Version](https://img.shields.io/badge/Module_Version-'"${VERSION}"'-44cc11?style=for-the-badge)](https://github.com/ZG089/Re-Malwack/releases/tag/'"${VERSION}"')|g' README.md
          echo "Updated README.md:"
          grep "Module Version" README.md
      
      - name: Install ImageMagick
        run: |
          sudo apt-get install -y imagemagick

      - name: Resize banner for Telegram
        run: |
          mogrify -resize 1280x1280\> assets/update.png

      - name: Extract changelog for the new version
        id: changelog
        run: |
          awk "/^## ${VERSION}/{flag=1;next}/^## /{flag=0}flag" changelog.md > CHANGELOG_PART.md
          if [ ! -s CHANGELOG_PART.md ]; then
            echo "No changelog found for ${VERSION}"
            exit 1
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          # Main changelog
          cat CHANGELOG_PART.md >> $GITHUB_ENV

          # Spacing
          echo "" >> $GITHUB_ENV
          echo "---" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV

          # Section title
          echo "### 🌐 Community" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV

          # Inline badges with links
          echo "[![Telegram Support group](https://img.shields.io/badge/Re--Malwack_Community-252850?style=for-the-badge&color=blue&logo=telegram&logoColor=white)](https://t.me/Re_Malwack) [![Discord Server](https://img.shields.io/discord/1463971306054881302?style=for-the-badge&logo=discord&label=Re-Malwack%20Community&color=7289da&logoColor=white)](https://discord.gg/6fgQCJWY2F) [![XDA Support thread](https://img.shields.io/badge/XDA_Support_thread-252850?style=for-the-badge&color=gray&logo=xdadevelopers)](https://xdaforums.com/t/re-malwack-revival-of-malwack-module.4690049/) [![Projects Channel on Telegram](https://img.shields.io/badge/Follow_Channel-ZGX_Projects-252850?style=for-the-badge&color=blue&logo=telegram)](https://t.me/zgx_projects)" >> $GITHUB_ENV
          
          # Spacing
          echo "" >> $GITHUB_ENV
          echo "---" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV

          echo "### ☕ Support Development" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "[![Donation](https://img.shields.io/badge/Support%20Development-black?style=for-the-badge&logo=buymeacoffee&logoColor=black&logoSize=auto&color=%23FFDD00)](https://buymeacoffee.com/zg089)" >> $GITHUB_ENV

          echo "EOF" >> $GITHUB_ENV
          # Smart auto-truncate for Telegram (API caption limit is 1024 chars)
          TG_CHANGELOG="$(cat CHANGELOG_PART.md)"
          MAX_LEN=600
          if [ ${#TG_CHANGELOG} -gt $MAX_LEN ]; then
            TG_CHANGELOG="${TG_CHANGELOG:0:$MAX_LEN}"
            printf "%s\n" "${TG_CHANGELOG% *}..." > CHANGELOG_TG.md
            echo "TG_TRUNCATED=true" >> $GITHUB_ENV
          else
            cat CHANGELOG_PART.md > CHANGELOG_TG.md
            echo "TG_TRUNCATED=false" >> $GITHUB_ENV
          fi

          echo "Extracted changelog:"
          cat CHANGELOG_PART.md

      - name: Commit updated version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module/module.prop update.json README.md
          git commit -m "module_release: bump version to ${VERSION}

          Co-authored-by: ZG089 <159061718+ZG089@users.noreply.github.com>"
          git push

      - name: Create ZIP
        run: |
          cd module
          zip -r "../$ZIP_NAME.zip" ./*
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "${{ github.event.inputs.releaseName || github.event.inputs.tag }}"
          body: ${{ env.CHANGELOG }}
          draft: false
          prerelease: false
          files: ${{ env.ZIP_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Update notification to Telegram Group
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          CHAT_ID="-1002271023118"
          THREAD_ID="347"
          VERSION="${{ github.event.inputs.releaseName || github.event.inputs.tag }}"
          CHANGELOG="$(cat CHANGELOG_TG.md)"
          TRUNCATED_MSG=""
          if [ "$TG_TRUNCATED" == "true" ]; then
            TRUNCATED_MSG="
          
          (Changelog was truncated. Read the full release notes on GitHub!)"
          fi
          CAPTION="🚨 *New Re-Malwack Update Released!*  
          > Version: *${VERSION}*
          \`\`\`
          What's new? 👀:
          ${CHANGELOG} ${TRUNCATED_MSG}
          \`\`\`
          🔗 Download: [Github](https://github.com/${{ github.repository }}/releases/latest) | [MMRL](https://mmrl.dev/repository/zguectZGR/Re-Malwack)
          🌐 @zgx\_projects x @Re\_Malwack
          ☕ [Support Development](https://buymeacoffee.com/zg089)"
          curl -sS "https://api.telegram.org/bot$BOT_TOKEN/sendPhoto" \
            -F chat_id="$CHAT_ID" \
            -F message_thread_id="$THREAD_ID" \
            -F photo="@assets/update.png" \
            -F caption="$CAPTION" \
            -F parse_mode="Markdown"

      - name: Send update notification to Telegram Channel
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          CHANNEL_ID="-1002453262614"
          VERSION="${{ env.VERSION }}"
          CHANGELOG="$(cat CHANGELOG_TG.md)"
          TRUNCATED_MSG=""
          if [ "$TG_TRUNCATED" == "true" ]; then
            TRUNCATED_MSG="
          
          (Changelog was truncated. Read the full release notes on GitHub!)"
          fi
          CAPTION="*Re-Malwack | New Update ✨*
          > Version: *${VERSION}*
          \`\`\`
          What's new? 👀:
          ${CHANGELOG} ${TRUNCATED_MSG}
          \`\`\`
          🔗 Download: [Github](https://github.com/${{ github.repository }}/releases/latest) | [MMRL](https://mmrl.dev/repository/zguectZGR/Re-Malwack)
          🌐 @zgx\_projects x @Re\_Malwack
          ☕ [Support Development](https://buymeacoffee.com/zg089)"
          curl -sS "https://api.telegram.org/bot$BOT_TOKEN/sendPhoto" \
            -F chat_id="$CHANNEL_ID" \
            -F photo="@assets/update.png" \
            -F caption="$CAPTION" \
            -F parse_mode="Markdown"