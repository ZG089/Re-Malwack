name: Telegram Commit Alerts

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_COMMITS_BOT }}
          CHAT_ID: -1002271023118
          THREAD_ID: 215
        run: |
          REPO="${{ github.repository }}"
          PUSHER="${{ github.actor }}"
          PUSHER_URL="https://github.com/${{ github.actor }}"
          COMMITS='${{ toJson(github.event.commits) }}'

          COUNT=$(echo "$COMMITS" | jq length)

          MESSAGE="<b>${PUSHER}</b> (<a href=\"${PUSHER_URL}\">profile</a>) pushed <b>${COUNT} commit(s)</b> to <b>${REPO}</b>\n\n"
          
          echo "$COMMITS" | jq -c '.[]' | while read -r commit; do
            SHA_FULL=$(echo "$commit" | jq -r '.id')
            SHA_SHORT=${SHA_FULL:0:7}
            URL=$(echo "$commit" | jq -r '.url')
            MSG=$(echo "$commit" | jq -r '.message')
          
            # Escape HTML
            ESC_MSG=$(echo "$MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            FIRST_LINE=$(echo "$ESC_MSG" | head -n1)
            BODY=$(echo "$ESC_MSG" | tail -n +2)
            MESSAGE="${MESSAGE}<code>${SHA_SHORT}</code> (<a href=\"${URL}\">view</a>) ${FIRST_LINE}\n${BODY}\n"
          
            # Co-authors
            COAUTHORS=$(echo "$ESC_MSG" | grep -i "Co-authored-by:" || true)
            if [ -n "$COAUTHORS" ]; then
              MESSAGE="${MESSAGE}${COAUTHORS}\n"
            fi
          
            MESSAGE="${MESSAGE}\n"
          done

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${THREAD_ID}" \
            -d text="$MESSAGE" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true
