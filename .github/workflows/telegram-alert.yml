name: Telegram Commit Alerts

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_COMMITS_BOT }}
          CHAT_ID: -1002271023118
          THREAD_ID: 215
        run: |
          REPO="${{ github.repository }}"
          REPO_URL="https://github.com/${REPO}"
          PUSHER="${{ github.actor }}"
          PUSHER_URL="https://github.com/${{ github.actor }}"
          COMMITS='${{ toJson(github.event.commits) }}'
          COUNT=$(echo "$COMMITS" | jq length)
          NL=$'\n'
      
          MESSAGE="🚀 <b><a href=\"${PUSHER_URL}\">${PUSHER}</a></b> pushed <b>${COUNT} commit(s)</b> to <b><a href=\"${REPO_URL}\">$(basename ${REPO})</a></b>${NL}${NL}"
      
          while read -r commit; do
            SHA_FULL=$(echo "$commit" | jq -r '.id')
            SHA_SHORT=${SHA_FULL:0:7}
            URL=$(echo "$commit" | jq -r '.url')
            MSG=$(echo "$commit" | jq -r '.message')
      
            ESC_MSG=$(printf '%s' "$MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            TITLE=$(printf '%s' "$ESC_MSG" | head -n1)
            BODY=$(printf '%s' "$ESC_MSG" | tail -n +2)
      
            MESSAGE="${MESSAGE}<blockquote>• <code>${SHA_SHORT}</code> — <a href=\"${URL}\">${TITLE}</a>${NL}"

            if [ -n "$BODY" ]; then
              while IFS= read -r line; do
                [ -n "$line" ] && MESSAGE="${MESSAGE}  └ ${line}${NL}"
              done <<< "$BODY"
            fi
            
            MESSAGE="${MESSAGE}</blockquote>${NL}"
          done <<< "$(echo "$COMMITS" | jq -c '.[]')"
  
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "text=${MESSAGE}" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${THREAD_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true
