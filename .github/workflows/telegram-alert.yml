name: Telegram Commit Alerts

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_COMMITS_BOT }}
          CHAT_ID: -1002271023118
          THREAD_ID: 215
        run: |
          REPO="${{ github.repository }}"
          REPO_URL="https://github.com/${REPO}"
          PUSHER="${{ github.actor }}"
          PUSHER_URL="https://github.com/${{ github.actor }}"
          COMMITS='${{ toJson(github.event.commits) }}'
          
          COUNT=$(echo "$COMMITS" | jq length)
          
          MESSAGE="🚀 <b><a href=\"${PUSHER_URL}\">${PUSHER}</a></b> pushed <b>${COUNT} commit(s)</b> to <b><a href=\"${REPO_URL}\">$(basename ${REPO})</a></b>\n\n"
          
          while read -r commit; do
            SHA_FULL=$(echo "$commit" | jq -r '.id')
            SHA_SHORT=${SHA_FULL:0:7}
            URL=$(echo "$commit" | jq -r '.url')
            MSG=$(echo "$commit" | jq -r '.message')
          
            # Escape HTML
            ESC_MSG=$(printf '%s\n' "$MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          
            TITLE=$(printf '%s\n' "$ESC_MSG" | head -n1)
            BODY=$(printf '%s\n' "$ESC_MSG" | tail -n +2)
          
            # Main line
            MESSAGE="${MESSAGE}• <code>${SHA_SHORT}</code> — <a href=\"${URL}\">${TITLE}</a>\n"
          
            # Body (indented)
            if [ -n "$BODY" ]; then
              while IFS= read -r line; do
                [ -n "$line" ] && MESSAGE="${MESSAGE}  └ ${line}\n"
              done <<< "$BODY"
            fi
          
            MESSAGE="${MESSAGE}\n"
          
          done <<< "$(echo "$COMMITS" | jq -c '.[]')"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${THREAD_ID}" \
            -d text="$MESSAGE" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true
