name: Telegram Commit Alerts

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_COMMITS_BOT }}
          CHAT_ID: -1002271023118
          THREAD_ID: 215
        run: |
          REPO="${{ github.repository }}"
          PUSHER="${{ github.actor }}"
          PUSHER_URL="https://github.com/${{ github.actor }}"
          COMMITS='${{ toJson(github.event.commits) }}'

          COUNT=$(echo "$COMMITS" | jq length)

          MESSAGE="*${PUSHER}* ([profile](${PUSHER_URL})) pushed *${COUNT} commit(s)* to *${REPO}*%0A%0A"

          echo "$COMMITS" | jq -c '.[]' | while read -r commit; do
            SHA_FULL=$(echo "$commit" | jq -r '.id')
            SHA_SHORT=${SHA_FULL:0:7}
            URL=$(echo "$commit" | jq -r '.url')
            MSG=$(echo "$commit" | jq -r '.message')

            # Escape Telegram MarkdownV2
            ESC_MSG=$(echo "$MSG" | sed 's/[_*[\]()~`>#+-=|{}.!]/\\&/g')

            FIRST_LINE=$(echo "$ESC_MSG" | head -n1)
            BODY=$(echo "$ESC_MSG" | tail -n +2)

            MESSAGE="${MESSAGE}\`${SHA_SHORT}\` ([view](${URL})) ${FIRST_LINE}%0A${BODY}%0A"

            # Co-authors
            COAUTHORS=$(echo "$MSG" | grep -i "Co-authored-by:" || true)
            if [ -n "$COAUTHORS" ]; then
              ESC_COAUTHORS=$(echo "$COAUTHORS" | sed 's/[_*[\]()~`>#+-=|{}.!]/\\&/g')
              MESSAGE="${MESSAGE}${ESC_COAUTHORS}%0A"
            fi

            MESSAGE="${MESSAGE}%0A"
          done

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${THREAD_ID}" \
            -d text="$MESSAGE" \
            -d parse_mode="MarkdownV2" \
            -d disable_web_page_preview=true
