name: CI Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  commit-notifications:
    name: Commit Notifications
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_COMMITS_BOT }}
          CHAT_ID: -1002271023118
          THREAD_ID: 215
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PUSHER: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          REPO_URL="https://github.com/${REPO}"
          PUSHER_URL="https://github.com/${PUSHER}"
          BRANCH_URL="${REPO_URL}/tree/${BRANCH}"
          COMMITS="$COMMITS_JSON"
          COUNT=$(echo "$COMMITS" | jq length)
          NL=$'\n'

          MESSAGE="🚀 <b><a href=\"${PUSHER_URL}\">${PUSHER}</a></b> pushed <b>${COUNT} commit(s)</b> to <b><a href=\"${REPO_URL}\">$(basename ${REPO})</a></b> on <b><a href=\"${BRANCH_URL}\">${BRANCH}</a></b>${NL}${NL}"

          while read -r commit; do
            SHA_FULL=$(echo "$commit" | jq -r '.id')
            SHA_SHORT=${SHA_FULL:0:7}
            URL=$(echo "$commit" | jq -r '.url')
            MSG=$(echo "$commit" | jq -r '.message')
            ESC_MSG=$(printf '%s' "$MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            TITLE=$(printf '%s' "$ESC_MSG" | head -n1)
            BODY=$(printf '%s' "$ESC_MSG" | tail -n +2 | sed '/^[[:space:]]*$/d')

            COAUTHORS=""
            while IFS= read -r line; do
              if echo "$line" | grep -iqE '^Co-authored-by:'; then
                CA_NAME=$(echo "$line" | sed -E 's/^Co-authored-by:[[:space:]]*//' | sed -E 's/[[:space:]]*<.*>//')
                COAUTHORS="${COAUTHORS}  👥 Co-author: <a href=\"https://github.com/${CA_NAME}\">${CA_NAME}</a>${NL}"
              fi
            done <<< "$MSG"

            MESSAGE="${MESSAGE}<blockquote>• <code>${SHA_SHORT}</code> — <a href=\"${URL}\"><b>${TITLE}</b></a>${NL}</blockquote>"

            if [ -n "$BODY" ]; then
              BODY_LINES=()
              while IFS= read -r line; do
                echo "$line" | grep -iqE '^Co-authored-by:' && continue
                [ -n "$line" ] && BODY_LINES+=("$line")
              done <<< "$BODY"
              TOTAL=${#BODY_LINES[@]}
              for i in "${!BODY_LINES[@]}"; do
                if [ $((i + 1)) -eq "$TOTAL" ]; then
                  MESSAGE="${MESSAGE}  └ ${BODY_LINES[$i]}${NL}"
                else
                  MESSAGE="${MESSAGE}  | ${BODY_LINES[$i]}${NL}"
                fi
              done
            fi

            [ -n "$COAUTHORS" ] && MESSAGE="${MESSAGE}${COAUTHORS}"
            MESSAGE="${MESSAGE}${NL}"
          done <<< "$(echo "$COMMITS" | jq -c '.[]')"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "text=${MESSAGE}" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${THREAD_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_COMMIT_NOTIFICATION }}
        run: |
          sudo apt-get install -y jq
          COMMITS=$(jq -r '.commits[].message' "$GITHUB_EVENT_PATH" | sed 's/^/- /')
          if [ -z "${COMMITS}" ]; then
            echo "Seems like the commit message is empty or whatever, skipping this call..."
            exit 0;
          fi
          # Escape newlines and quotes properly by using jq to construct JSON
          PAYLOAD=$(jq -n \
            --arg content "**New push** to ${GITHUB_REF#refs/heads/}\nRepository: ${GITHUB_REPOSITORY}\nPusher: ${GITHUB_ACTOR}\nCommits:\n$COMMITS" \
            '{content: $content}')
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               $DISCORD_WEBHOOK

  build:
    name: Build Test Release
    if: "!contains(github.event.head_commit.message, '[skip build]') && !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      zip_name: ${{ steps.setup.outputs.zip_name }}
      version: ${{ steps.setup.outputs.version }}
      test_build_id: ${{ steps.setup.outputs.test_build_id }}
      commit_username: ${{ steps.setup.outputs.commit_username }}
      commit_author_url: ${{ steps.setup.outputs.commit_author_url }}
      commit_url: ${{ steps.setup.outputs.commit_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set variables
        id: setup
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BRANCH_NAME="${GITHUB_REF_NAME}"
          VERSION=$(jq -r .version update.json)
          TEST_BUILD_ID="${COMMIT_HASH}@${BRANCH_NAME}"
          ZIP_NAME="Re-Malwack_${VERSION}-${TEST_BUILD_ID}"
          
          COMMIT_USERNAME="${{ github.event.head_commit.author.username }}"
          [ -z "$COMMIT_USERNAME" ] && COMMIT_USERNAME="${{ github.actor }}"
          
          COMMIT_AUTHOR_URL="https://github.com/$COMMIT_USERNAME"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/$(git rev-parse HEAD)"
          
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "test_build_id=$TEST_BUILD_ID" >> $GITHUB_OUTPUT
          echo "commit_username=$COMMIT_USERNAME" >> $GITHUB_OUTPUT
          echo "commit_author_url=$COMMIT_AUTHOR_URL" >> $GITHUB_OUTPUT
          echo "commit_url=$COMMIT_URL" >> $GITHUB_OUTPUT
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TEST_BUILD_ID=$TEST_BUILD_ID" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 'latest'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: build webui
        run: |
          cd webui
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Update module.prop version
        run: |
          sed -i "s/^version=.*/version=${VERSION}-test (${TEST_BUILD_ID})/" module/module.prop
          echo "Updated module.prop:"
          grep "^version=" module/module.prop
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build Zygisk Logger
        run: |
          ndk-build -C zygisk/jni
          mkdir -p module/zygisk_opt
          cp zygisk/libs/arm64-v8a/libzygisk_logger.so module/zygisk_opt/arm64-v8a.so
          cp zygisk/libs/armeabi-v7a/libzygisk_logger.so module/zygisk_opt/armeabi-v7a.so
          cp zygisk/libs/x86/libzygisk_logger.so module/zygisk_opt/x86.so
          cp zygisk/libs/x86_64/libzygisk_logger.so module/zygisk_opt/x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: module/

  send-release:
    name: Send Test Release
    needs: build
    if: "!contains(github.event.head_commit.message, '[skip send]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: module/
          
      - name: Create ZIP
        env:
          ZIP_NAME: ${{ needs.build.outputs.zip_name }}
        run: |
          cd module
          zip -r "../$ZIP_NAME.zip" ./*
          cd ..

      - name: Send Release
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          THUMB: ${{ github.workspace }}/assets/dl.jpg
          COMMIT_HASH: ${{ github.sha }}
          DISCORD_RELEASES: ${{ secrets.DISCORD_RELEASES }}
          VERSION: ${{ needs.build.outputs.version }}
          TEST_BUILD_ID: ${{ needs.build.outputs.test_build_id }}
          ZIP_NAME: ${{ needs.build.outputs.zip_name }}
          COMMIT_USERNAME: ${{ needs.build.outputs.commit_username }}
          COMMIT_AUTHOR_URL: ${{ needs.build.outputs.commit_author_url }}
          COMMIT_URL: ${{ needs.build.outputs.commit_url }}
        run: |
          COMMIT_MSG_RAW=$(git log -1 --pretty=format:'%B')
          COMMIT_AUTHOR="$COMMIT_USERNAME"
          
          # Escape for Telegram HTML
          COMMIT_MSG_TG="${COMMIT_MSG_RAW//&/&amp;}"
          COMMIT_MSG_TG="${COMMIT_MSG_TG//</&lt;}"
          COMMIT_MSG_TG="${COMMIT_MSG_TG//>/&gt;}"
          
          # Generate Discord payload using jq to safely handle quotes and newlines
          PAYLOAD=$(jq -n \
            --arg msg "$COMMIT_MSG_RAW" \
            --arg ver "$VERSION" \
            --arg tid "$TEST_BUILD_ID" \
            --arg author "$COMMIT_AUTHOR" \
            --arg authorUrl "$COMMIT_AUTHOR_URL" \
            --arg commitUrl "$COMMIT_URL" \
            --arg runUrl "$RUN_URL" \
            '{content: "⚙️ **New test release**\n\n\($msg)\n\n`Base Version: \($ver)`\n`Test Build ID: \($tid)`\n\nAuthor: *[\($author)](\($authorUrl))*\n\n[View Commit](\($commitUrl))\n[Workflow Run](\($runUrl))"}')

          cat <<EOF > tg_caption.txt
          ⚙️ <b>New test release!</b>
          <pre>${COMMIT_MSG_TG}</pre>
          👤 Author: <b><a href="${COMMIT_AUTHOR_URL}">${COMMIT_AUTHOR}</a></b>
          ⚙ Base Version: <code>${VERSION}</code>
          🧪 Test Build ID: <code>${TEST_BUILD_ID}</code>
          =================================
          <a href="${COMMIT_URL}">- View Commit -</a>
          <a href="${RUN_URL}">- Workflow Run -</a>
          EOF

          curl -sS "https://api.telegram.org/bot$BOT_TOKEN/sendDocument" \
              -F chat_id="-1002271023118" \
              -F message_thread_id="1314" \
              -F document=@"${ZIP_NAME}.zip" \
              -F thumb=@"$THUMB" \
              -F caption="<tg_caption.txt" \
              -F parse_mode="HTML"
          curl -X POST -H "Content-Type: multipart/form-data" -F \
            "payload_json=$PAYLOAD" -F "file=@$ZIP_NAME.zip" "$DISCORD_RELEASES"
