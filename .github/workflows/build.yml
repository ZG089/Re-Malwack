name: build

on:
  push:
    branches:
      - '**'
      - '!hosts-update'
    paths:
      - '.github/workflows/build.yml'
      - 'module/**'
      - 'update.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set variables
        id: setup
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BRANCH_NAME="${GITHUB_REF_NAME}"
          VERSION=$(jq -r .version update.json)
          TEST_BUILD_ID="${COMMIT_HASH}@${BRANCH_NAME}"
          ZIP_NAME="Re-Malwack_${VERSION}-${TEST_BUILD_ID}"
          COMMIT_AUTHOR_URL="https://github.com/${{ github.event.head_commit.author.username }}"
          COMMIT_USERNAME="${{ github.event.head_commit.author.username }}"


          echo "COMMIT_USERNAME=$COMMIT_USERNAME" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR_URL=$COMMIT_AUTHOR_URL" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHORT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "TEST_BUILD_ID=$TEST_BUILD_ID" >> $GITHUB_ENV
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 'latest'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: build webui
        run: |
          cd webui
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Update module.prop version
        run: |
          sed -i "s/^version=.*/version=${VERSION}-test (${TEST_BUILD_ID})/" module/module.prop
          echo "Updated module.prop:"
          grep "^version=" module/module.prop

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: module/

      - name: Create ZIP
        run: |
          cd module
          zip -r "../$ZIP_NAME.zip" ./*
          cd ..

      - name: Check Commit Info
        id: check_commit
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s\n' "$COMMIT_MSG" | head -n1 | grep -qiE "release|version|readme|website|site"; then
            echo "SKIP=true" >> $GITHUB_ENV
            SKIP=true
          else
            echo "SKIP=false" >> $GITHUB_ENV
            SKIP=false
          fi
          echo "SKIP_RELEASE: $SKIP"

      - name: Send Release
        if: env.SKIP == 'false'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          THUMB: ${{ github.workspace }}/assets/dl.jpg
          COMMIT_HASH: ${{ github.sha }}
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.username }}
          COMMIT_AUTHOR_URL: ${{ env.COMMIT_AUTHOR_URL }}
          DISCORD_RELEASES: ${{ secrets.DISCORD_RELEASES }}
        run: |
          COMMIT_MSG="$COMMIT_MSG_RAW"
          CONTENT="⚙️ **New test release**\n\n$COMMIT_MSG\n\n\`Base Version: $VERSION\`\n\`Test Build ID: $TEST_BUILD_ID\`\n\nAuthor: *[$COMMIT_AUTHOR]($COMMIT_AUTHOR_URL)*\n\n[View Commit]($COMMIT_URL)\n[Workflow Run]($RUN_URL)"
          curl -sS "https://api.telegram.org/bot$BOT_TOKEN/sendDocument" \
              -F chat_id="-1002271023118" \
              -F message_thread_id="1314" \
              -F document=@"$ZIP_NAME.zip" \
              -F thumb=@"$THUMB" \
              -F caption="⚙️ <b>New test release!</b>
          <code>$COMMIT_MSG</code>
          Author: <b><a href=\"$COMMIT_AUTHOR_URL\">$COMMIT_AUTHOR</a></b>
          Base Version: <code>${VERSION}</code>
          Test Build ID: <code>${TEST_BUILD_ID}</code>
          =================================
          <a href=\"$COMMIT_URL\">- View Commit -</a>
          <a href=\"$RUN_URL\">- Workflow Run -</a>" \
          -F parse_mode="HTML"
          curl -X POST -H "Content-Type: multipart/form-data" -F \
            "payload_json={\"content\": \"$CONTENT\"}" -F "file=@$ZIP_NAME.zip" "$DISCORD_RELEASES"
