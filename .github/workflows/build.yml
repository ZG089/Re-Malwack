name: build

on:
  push:
    paths:
      - '.github/workflows/build.yml'
      - 'module/**'
      - 'webui/**'
      - 'update.json'
  workflow_dispatch:

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set variables
        id: setup
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BRANCH_NAME="${GITHUB_REF_NAME}"
          VERSION=$(jq -r .version update.json)
          TEST_BUILD_ID="${COMMIT_HASH}@${BRANCH_NAME}"
          ZIP_NAME="Re-Malwack_${VERSION}-${TEST_BUILD_ID}"
          
          COMMIT_USERNAME="${{ github.event.head_commit.author.username }}"
          [ -z "$COMMIT_USERNAME" ] && COMMIT_USERNAME="${{ github.actor }}"
          
          COMMIT_AUTHOR_URL="https://github.com/$COMMIT_USERNAME"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/$(git rev-parse HEAD)"
          echo "COMMIT_USERNAME=$COMMIT_USERNAME" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR_URL=$COMMIT_AUTHOR_URL" >> $GITHUB_ENV
          echo "COMMIT_URL=$COMMIT_URL" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHORT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "TEST_BUILD_ID=$TEST_BUILD_ID" >> $GITHUB_ENV
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 'latest'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: build webui
        run: |
          cd webui
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Update module.prop version
        run: |
          sed -i "s/^version=.*/version=${VERSION}-test (${TEST_BUILD_ID})/" module/module.prop
          echo "Updated module.prop:"
          grep "^version=" module/module.prop
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build Zygisk Logger
        run: |
          ndk-build -C zygisk/jni
          mkdir -p module/zygisk_opt
          cp zygisk/libs/arm64-v8a/libzygisk_logger.so module/zygisk_opt/arm64-v8a.so
          cp zygisk/libs/armeabi-v7a/libzygisk_logger.so module/zygisk_opt/armeabi-v7a.so
          cp zygisk/libs/x86/libzygisk_logger.so module/zygisk_opt/x86.so
          cp zygisk/libs/x86_64/libzygisk_logger.so module/zygisk_opt/x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: module/

      - name: Create ZIP
        run: |
          cd module
          zip -r "../$ZIP_NAME.zip" ./*
          cd ..

      - name: Send Release
        if: true
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          THUMB: ${{ github.workspace }}/assets/dl.jpg
          COMMIT_HASH: ${{ github.sha }}
          DISCORD_RELEASES: ${{ secrets.DISCORD_RELEASES }}
        run: |
          COMMIT_MSG_RAW=$(git log -1 --pretty=format:'%B')
          COMMIT_AUTHOR="$COMMIT_USERNAME"
          # Escape for Telegram HTML
          COMMIT_MSG_TG=$(printf '%s' "$COMMIT_MSG_RAW" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          
          # Generate Discord payload using jq to safely handle quotes and newlines
          PAYLOAD=$(jq -n \
            --arg msg "$COMMIT_MSG_RAW" \
            --arg ver "$VERSION" \
            --arg tid "$TEST_BUILD_ID" \
            --arg author "$COMMIT_AUTHOR" \
            --arg authorUrl "$COMMIT_AUTHOR_URL" \
            --arg commitUrl "$COMMIT_URL" \
            --arg runUrl "$RUN_URL" \
            '{content: "⚙️ **New test release**\n\n\($msg)\n\n`Base Version: \($ver)`\n`Test Build ID: \($tid)`\n\nAuthor: *[\($author)](\($authorUrl))*\n\n[View Commit](\($commitUrl))\n[Workflow Run](\($runUrl))"}')

          curl -sS "https://api.telegram.org/bot$BOT_TOKEN/sendDocument" \
              -F chat_id="-1002271023118" \
              -F message_thread_id="1314" \
              -F document=@"$ZIP_NAME.zip" \
              -F thumb=@"$THUMB" \
              -F caption="⚙️ <b>New test release!</b>
          <pre>$COMMIT_MSG_TG</pre>
          👤 Author: <b><a href=\"$COMMIT_AUTHOR_URL\">$COMMIT_AUTHOR</a></b>
          ⚙ Base Version: <code>${VERSION}</code>
          🧪 Test Build ID: <code>${TEST_BUILD_ID}</code>
          =================================
          <a href=\"$COMMIT_URL\">- View Commit -</a>
          <a href=\"$RUN_URL\">- Workflow Run -</a>" \
          -F parse_mode="HTML"
          curl -X POST -H "Content-Type: multipart/form-data" -F \
            "payload_json=$PAYLOAD" -F "file=@$ZIP_NAME.zip" "$DISCORD_RELEASES"
